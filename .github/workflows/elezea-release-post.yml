name: Post release to elezea.com
on:
  release:
    types: [published]
jobs:
  post:
    if: github.event.release.prerelease == false && github.event.release.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          ELEZEA_PUBLISH_TOKEN: ${{ secrets.ELEZEA_PUBLISH_TOKEN }}
        with:
          script: |
            const { data: r } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
            });
            const res = await fetch('https://elezea-prod.rian-db8.workers.dev/api/publish/release', {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${process.env.ELEZEA_PUBLISH_TOKEN}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                repo: context.repo.repo,
                version: r.tag_name,
                release_name: r.name,
                body: r.body ?? '',
                release_url: r.html_url,
              }),
            });
            if (!res.ok) core.setFailed(`Publish failed: ${res.status} ${await res.text()}`);
